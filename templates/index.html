{% extends 'base.html' %}
{% load static %}
{% block content %}
  <main>
    <section class="hero reveal">
      <h1>خرید و فروش <span>خودرو و موتورسیکلت</span><br>سریع، امن و بدون واسطه</h1>
      <p>آگهی‌تو رایگان ثبت کن یا بین صدها خودرو و موتور فیلتر شده، دقیقا همونی که دنبالشی رو پیدا کن.</p>
      <div class="hero-stats">
        <div class="stat"><b id="statTotal">0</b><span>آگهی فعال</span></div>
        <div class="stat"><b id="statCar">0</b><span>خودرو</span></div>
        <div class="stat"><b id="statMoto">0</b><span>موتورسیکلت</span></div>
      </div>
    </section>

    <section class="filters reveal reveal-1">
      <div class="filter-row">
        <input id="fSearch" placeholder="جستجو برند یا مدل…" />
        <select id="fType">
          <option value="">نوع: همه</option>
          <option value="car">خودرو</option>
          <option value="moto">موتورسیکلت</option>
        </select>
        <select id="fBrand"><option value="">برند: همه</option></select>
        <input id="fPriceMin" type="number" placeholder="حداقل قیمت (میلیون)" />
        <input id="fPriceMax" type="number" placeholder="حداکثر قیمت (میلیون)" />
        <button class="btn btn-ghost" id="btnResetFilter">پاک کردن</button>
      </div>
    </section>

    <div class="section-head">
      <h2>آگهی‌های اخیر</h2>
      <span id="resultCount"></span>
    </div>
    <div class="grid" id="listingGrid"></div>
  </main>
{% endblock %}
